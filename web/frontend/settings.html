<!DOCTYPE html>
<html lang="zh-CN" data-bs-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>设置 — scan-job</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta21/dist/css/tabler.min.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg">
  <div class="container-xl">
    <a class="navbar-brand text-white" href="/dashboard">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="me-2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
      </svg>
      scan-job
    </a>
    <div class="navbar-nav ms-auto">
      <a class="nav-link" href="/dashboard">仪表盘</a>
      <a class="nav-link" href="/projects">项目列表</a>
      <a class="nav-link" href="/scan">扫描管理</a>
      <a class="nav-link active" href="/settings">设置</a>
    </div>
  </div>
</nav>

<div class="container-xl py-4" v-scope="SettingsApp()" @vue:mounted="load()" style="max-width:700px">

  <div class="card">
    <div class="card-header">⚙️ 系统设置</div>
    <div class="card-body">

      <!-- CMC API Key -->
      <div class="mb-4">
        <label class="form-label fw-semibold">CoinMarketCap API Key</label>
        <input type="password" class="form-control" v-model="cmc_api_key"
               placeholder="输入新 Key（留空不修改）">
        <small class="text-muted">当前: {{ current_cmc }}</small>
      </div>

      <hr style="border-color: var(--border)">

      <!-- 代理 -->
      <div class="mb-3">
        <label class="form-label fw-semibold">代理配置</label>
        <div class="form-check form-switch mb-2">
          <input type="checkbox" class="form-check-input" v-model="proxy_enabled">
          <label class="form-check-label">启用代理</label>
        </div>
        <input type="text" class="form-control" v-model="proxy_url"
               placeholder="socks5://127.0.0.1:1080">
      </div>

      <hr style="border-color: var(--border)">

      <button class="btn btn-primary w-100" @click="save()">💾 保存设置</button>

      <div class="mt-3 text-center">
        <span class="text-muted" v-if="saved">✅ 已保存</span>
      </div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/petite-vue@0.4.1/dist/petite-vue.iife.js"></script>
<script src="/static/app.js"></script>
<script>
function SettingsApp() {
  return {
    cmc_api_key: '',
    proxy_url: '',
    proxy_enabled: true,
    current_cmc: '',
    saved: false,
    async load() {
      try {
        const s = await API.get('/api/settings');
        this.current_cmc = s.cmc_api_key || '未配置';
        this.proxy_url = s.proxy_url || '';
        this.proxy_enabled = s.proxy_enabled;
      } catch (e) { console.error(e); }
    },
    async save() {
      try {
        const body = {
          proxy_url: this.proxy_url,
          proxy_enabled: this.proxy_enabled,
        };
        if (this.cmc_api_key) body.cmc_api_key = this.cmc_api_key;
        await API.post('/api/settings', body);
        this.saved = true;
        this.cmc_api_key = '';
        await this.load();
        toast('设置已保存', 'success');
        setTimeout(() => this.saved = false, 2000);
      } catch (e) {
        toast('保存失败: ' + e.message, 'error');
      }
    },
  };
}
PetiteVue.createApp().mount();
</script>
</body>
</html>
